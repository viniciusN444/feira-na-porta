<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Painel ADM
    </title>

    <link rel="stylesheet" href="/css/adm.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container py-5">

        <h1 class="titulo-adm">

            Painel Administrativo

        </h1>

        <div class="text-end mb-3">

            <button class="btn btn-danger" id="btn-logout">

                Sair

            </button>

        </div>

        <!-- DASHBOARD PRINCIPAL -->

        <div class="row mb-4">

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <h3 id="total-produtos">
                        0
                    </h3>

                    <p>
                        Produtos
                    </p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <h3 id="total-pedidos">
                        0
                    </h3>

                    <p>
                        Pedidos
                    </p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <h3 id="pedidos-pendentes">
                        0
                    </h3>

                    <p>
                        Pendentes
                    </p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <h3 id="valor-vendido">
                        R$ 0,00
                    </h3>

                    <p>
                        Vendas Totais
                    </p>

                </div>

            </div>

        </div>

        <!-- NOVOS CARDS -->

        <div class="row mb-4">

            <div class="col-md-4">

                <div class="card dashboard-card">

                    <h3 id="pedidos-preparo">
                        0
                    </h3>

                    <p>
                        Em preparo
                    </p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card">

                    <h3 id="pedidos-entrega">
                        0
                    </h3>

                    <p>
                        Saiu para entrega
                    </p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card">

                    <h3 id="pedidos-entregues">
                        0
                    </h3>

                    <p>
                        Entregues
                    </p>

                </div>

            </div>

        </div>

        <div class="card p-4 formulario-adm">

            <h3>

                Cadastrar Produto

            </h3>

            <input type="text" id="nome-produto" class="form-control mb-3" placeholder="Nome do produto">

            <input type="text" id="preco-produto" class="form-control mb-3" placeholder="Preço">

            <input type="file" id="imagem-produto" class="form-control mb-3">

            <select id="categoria-produto" class="form-select mb-3">

                <option value="">

                    Escolha a categoria

                </option>

                <option value="frutas">

                    Frutas

                </option>

                <option value="verduras">

                    Verduras

                </option>

                <option value="legumes">

                    Legumes

                </option>

                <option value="hortalicas">

                    Hortaliças

                </option>

            </select>

            <button class="btn btn-cadastrar w-100">

                Cadastrar Produto

            </button>

            <hr>

            <h3 class="mt-4">

                Produtos cadastrados

            </h3>

            <input type="text" id="campo-busca-adm" class="form-control mb-4" placeholder="Buscar produto...">

            <div id="lista-produtos">

            </div>

            <h2 class="mt-5 mb-3">

                Pedidos Recebidos

            </h2>

            <input type="text"
                id="busca-cliente"
                class="form-control mb-3"
                placeholder="Buscar cliente pelo nome...">

            <select id="filtro-status" class="form-select mb-3">

                <option value="Todos">
                    Todos
                </option>

                <option value="Pendente">
                    Pendente
                </option>

                <option value="Em preparo">
                    Em preparo
                </option>

                <option value="Saiu para entrega">
                    Saiu para entrega
                </option>

                <option value="Entregue">
                    Entregue
                </option>

            </select>

            <div id="lista-pedidos">

            </div>

        </div>

    </div>

    <script src="/js/adm.js"></script>

</body>

</html>

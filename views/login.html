<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login ADM</title>

    <link rel="stylesheet"
    href="/css/adm.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

    <div class="container py-5">

        <div class="card formulario-adm p-4">

            <h1 class="titulo-adm">
                Login Administrativo
            </h1>

            <input
            type="text"
            id="usuario"
            class="form-control mb-3"
            placeholder="Usuário">

            <input
            type="password"
            id="senha"
            class="form-control mb-3"
            placeholder="Senha">

            <button
            class="btn btn-cadastrar w-100"
            id="btn-login">

                Entrar

            </button>

            <p
            id="mensagem-erro"
            class="text-danger mt-3 text-center">

            </p>

        </div>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
